<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial scale=1.0">
    <title>hibiscus study ❀</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <nav>
            <h2>hibiscus.study</h2>
            <ul class="nav-links">
                <li><h3><a href="index.html">pomodoro</a></h3></li>
                <li><h3><a href="todo.html">to-do</a></h3>
            </ul>
        </nav>

    <div id="todo-container">
        <!-- to do list header-->
         <!-- <div id="todo-header">
            <h1>To Do List</h1>
         </div>
         -->
         <!-- input box -->
          <div id="todo-form">
            <input
                type="text"
                class="input-item"
                name="input-box"
                id="input-box"
                placeholder="Add Task"
            />

            <!-- button -->
             <button id="input-button" onclick="addTask()">Add</button>
          </div>

          <!-- task list -->
           <h2>Task List</h2>
           <ul id="list-container"></ul>
          
           <hr />
           <!-- task list counter-->
            <div class="counter-container">
                <div id="task-counters">
                    Completed: <span id="completed-counter">0</span> | Uncompleted:
                    <span id="uncompleted-counter">0</span>
                </div>
            </div>

        </div>

    <script src="app.js"></script>
</body>
